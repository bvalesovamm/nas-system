function globalSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) { renderAll(); return; }

  const results = [];

  // Tasks
  DB.tasks.forEach((t, i) => {
    const text = `${t.title || ''} ${t.category || t.domain || ''} ${t.contact || t.reason || ''} ${t.deadline || ''}`.toLowerCase();
    if (text.includes(q)) results.push({ page: "tasks", label: "Úkol", title: t.title, snippet: (t.contact || t.reason || '') + (t.deadline ? ' · ' + t.deadline : '') });
  });
  // Examinations
  DB.examinations.forEach(e => {
    if ((e.type + " " + e.conclusion + " " + e.domain).toLowerCase().includes(q))
      results.push({ page: "examinations", label: "Vyšetření", title: `${e.date} · ${e.type}`, snippet: e.conclusion });
  });
  // Contacts
  DB.contacts.forEach(c => {
    if ((c.name + " " + c.specialty + " " + c.role).toLowerCase().includes(q))
      results.push({ page: "contacts", label: "Kontakt", title: c.name, snippet: c.role + " · " + c.phone });
  });
  // Questions
  DB.questions.forEach(qq => {
    if (qq.q.toLowerCase().includes(q))
      results.push({ page: "questions", label: "Otázka pro " + qq.doctor, title: qq.q, snippet: "" });
  });
  // Diagnoses
  DB.diagnoses.forEach(d => {
    if ((d.code + " " + d.name + " " + d.note).toLowerCase().includes(q))
      results.push({ page: "diagnoses", label: "Diagnóza", title: `${d.code} · ${d.name}`, snippet: d.note });
  });
  // Topics
  DB.topics.forEach(t => {
    const text = `${t.title} ${t.know} ${(t.doing || []).join(" ")} ${(t.todo || []).join(" ")}`.toLowerCase();
    if (text.includes(q)) results.push({ page: "topics", label: "Tematická oblast", title: t.title, snippet: t.know.slice(0, 120) + "…" });
  });
  // Genetic findings
  DB.genetics.findings.forEach(f => {
    if ((f.gene + " " + f.disease + " " + f.note).toLowerCase().includes(q))
      results.push({ page: "genetics", label: "Genetický nález", title: `${f.gene} · ${f.disease}`, snippet: f.note });
  });
  // Appointments (kalendář)
  (DB.appointments || []).forEach(a => {
    const text = `${a.ambulance || ''} ${a.lekar || ''} ${a.kde || ''} ${a.komentar || ''} ${a.frekvence || ''}`.toLowerCase();
    if (text.includes(q)) results.push({ page: "appointments", label: "Kontrola", title: `${a.ambulance} · ${a.lekar || ''}`, snippet: `${a.budouciDate || a.budouciText || ''} · ${a.komentar || ''}` });
  });
  // Exercise log
  (DB.exerciseLog || []).forEach(e => {
    if (`${e.date} ${e.poznamka || ''}`.toLowerCase().includes(q))
      results.push({ page: "exercise", label: "Cvičení", title: e.date, snippet: e.poznamka || `Cvičil: ${e.cvicil}` });
  });
  // Supplements
  (DB.supplements || []).forEach(s => {
    if (`${s.name} ${s.note || ''} ${s.dose || ''}`.toLowerCase().includes(q))
      results.push({ page: "supplements", label: "Doplněk", title: s.name, snippet: `${s.dose || ''} · ${s.note || ''}` });
  });

  const highlight = txt => esc(txt).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi"), "<mark>$1</mark>");

  $("#main").innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Hledat: "${esc(query)}"</div>
        <div class="page-subtitle">${results.length} výsledků</div>
      </div>
      <div class="page-actions">
        <button class="btn" onclick="renderAll()">✕ Zavřít</button>
      </div>
    </div>
    ${results.length ? `<div class="list-wrap">
      ${results.map(r => `
        <div class="item-row" onclick="goto('${r.page}')" style="cursor:pointer">
          <div class="item-body">
            <div class="item-meta" style="margin-bottom:4px"><span class="tag blue">${esc(r.label)}</span></div>
            <div class="item-title">${highlight(r.title)}</div>
            ${r.snippet ? `<div style="font-size:12.5px;color:var(--ink-muted);margin-top:4px">${highlight(r.snippet)}</div>` : ""}
          </div>
        </div>
      `).join("")}
    </div>` : `<div class="empty">Nic nenalezeno</div>`}
  `;
}

// ── PŘIDÁNÍ NOVÉ DLAŽDICE DO ROZCESTNÍKU ──────────────────────────
// Stačí přidat jeden záznam do MODULES níže:
//   mojeId: { label: "Název", icon: "🧩", color: "var(--blue)", soon: true }
// soon:true = dlaždice je vidět, ale označená "Brzy" a neklikací (modul ještě nemá obsah).
// Až bude modul hotový: smaž soon a přidej status:()=>"...krátký stav..." + napoj jeho stránky.
const MODULES = {
  care: {
    label: "Péče — Martin",
    icon: "🩺",
    color: "var(--accent)",
    status: () => DB.tasks.filter(t => !t.done).length + " otevřených úkolů"
  },
  tasks:   { label: "Úkoly",     icon: "✅", color: "var(--blue)",   soon: true },
  finance: { label: "Finance",   icon: "💰", color: "var(--green)",  soon: true },
  home:    { label: "Domácnost", icon: "🏡", color: "var(--yellow)", soon: true }
};

function renderHub() {
  const wrap = document.getElementById("hubTiles");
  if (!wrap || !DB) return;
  wrap.innerHTML = Object.keys(MODULES).map(key => {
    const m = MODULES[key];
    let status = "";
    if (!m.soon && m.status) { try { status = m.status(); } catch (e) { status = ""; } }
    const footer = m.soon
      ? `<div class="tile-soon">Brzy</div>`
      : `<div class="tile-status">${esc(status)}</div>`;
    const click = m.soon ? "" : `onclick="enterModule('${key}')"`;
    return `
      <div class="hub-tile ${m.soon ? "disabled" : ""}" ${click}>
        <div class="tile-bar" style="background:${m.color}"></div>
        <div class="tile-icon">${m.icon}</div>
        <div class="tile-name">${esc(m.label)}</div>
        ${footer}
      </div>`;
  }).join("");
  const cal = document.getElementById("hubCalendar");
  if (cal) cal.innerHTML = renderHubCalendar();
}

// ── Hub kalendář: sdružuje datované události napříč moduly ──────────
let hubCalMonth = (() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); })();
let hubDayDetail = null;
let hubCalAssignee = "all"; // filtr hub kalendáře podle řešitele

// Pomocníci pro úkoly: řešitelé, opakování
const ASSIGNEES = ["", "Já", "Partner", "Oba"];
const WEEKDAYS_CZ = ["Ne", "Po", "Út", "St", "Čt", "Pá", "So"]; // index = JS getDay()
function assigneeBadge(a) {
  if (!a) return "";
  const col = a === "Já" ? "var(--teal)" : a === "Partner" ? "var(--purple)" : "var(--accent)";
  return `<span class="tag" style="background:${col};color:#fff">${esc(a)}</span>`;
}
function repeatLabel(r) {
  if (!r) return "";
  if (r.freq === "daily") return "denně";
  if (r.freq === "weekly") return "týdně · " + (WEEKDAYS_CZ[r.weekday ?? 1] || "Po");
  if (r.freq === "monthly") return "měsíčně · " + (r.day || 1) + ".";
  return "";
}
function parseWeekdayCz(s) {
  const i = WEEKDAYS_CZ.findIndex(w => w.toLowerCase() === String(s || "").trim().toLowerCase());
  return i >= 0 ? i : 1; // default pondělí
}
function buildRepeat(freqLabel, whenStr) {
  if (freqLabel === "Denně") return { freq: "daily" };
  if (freqLabel === "Týdně") return { freq: "weekly", weekday: parseWeekdayCz(whenStr) };
  if (freqLabel === "Měsíčně") return { freq: "monthly", day: Math.min(Math.max(parseInt(whenStr) || 1, 1), 31) };
  return null;
}
function isoOf(y, m, d) { return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`; }
function taskOccurrencesInMonth(t, year, month) {
  const r = t.repeat; if (!r) return [];
  const last = new Date(year, month + 1, 0).getDate();
  const out = [];
  if (r.freq === "daily") { for (let d = 1; d <= last; d++) out.push(isoOf(year, month, d)); }
  else if (r.freq === "weekly") { for (let d = 1; d <= last; d++) { if (new Date(year, month, d).getDay() === (r.weekday ?? 1)) out.push(isoOf(year, month, d)); } }
  else if (r.freq === "monthly") { out.push(isoOf(year, month, Math.min(r.day || 1, last))); }
  return out;
}

// Barvy kategorií v kalendáři (tečka = kategorie). Doplní se s dalšími moduly.
const HUB_EVENT_CATS = {
  "Kontrola": "var(--teal)",
  "Volání":   "var(--yellow)",
  "Úkol":     "var(--red)"
};

function hubEvents() {
  const evs = [];
  (DB.appointments || []).forEach(a => {
    if (parseDateIso(a.budouciDate)) evs.push({ iso: a.budouciDate, label: (a.ambulance || "") + (a.lekar ? " · " + a.lekar : ""), cat: "Kontrola", module: "care", page: "appointments", assignee: "" });
    if (parseDateIso(a.terminVolaniDate)) evs.push({ iso: a.terminVolaniDate, label: "Volat: " + (a.ambulance || ""), cat: "Volání", module: "care", page: "appointments", assignee: "" });
  });
  (DB.tasks || []).forEach(t => {
    if (!t.done && !t.repeat && parseDateIso(t.dueDate)) evs.push({ iso: t.dueDate, label: t.title || "", cat: "Úkol", module: "care", page: "tasks", assignee: t.assignee || "" });
  });
  return evs;
}

// Události pro daný měsíc včetně rozbalených opakovaných úkolů
function hubEventsExpanded(year, month) {
  const evs = hubEvents().filter(e => { const d = parseDateIso(e.iso); return d && d.getFullYear() === year && d.getMonth() === month; });
  (DB.tasks || []).forEach(t => {
    if (t.done || !t.repeat) return;
    taskOccurrencesInMonth(t, year, month).forEach(iso => evs.push({ iso, label: t.title || "", cat: "Úkol", module: "care", page: "tasks", assignee: t.assignee || "", repeat: true }));
  });
  return evs;
}

function hubFilterAssignee(evs) {
  if (hubCalAssignee === "all") return evs;
  return evs.filter(e => e.cat !== "Úkol" || e.assignee === hubCalAssignee || e.assignee === "Oba");
}

function refreshHubCalendar() {
  const cal = document.getElementById("hubCalendar");
  if (cal) cal.innerHTML = renderHubCalendar();
}
function hubCalShift(delta) { hubCalMonth = new Date(hubCalMonth.getFullYear(), hubCalMonth.getMonth() + delta, 1); hubDayDetail = null; refreshHubCalendar(); }
function hubCalToday() { const d = new Date(); hubCalMonth = new Date(d.getFullYear(), d.getMonth(), 1); hubDayDetail = d.toISOString().slice(0, 10); refreshHubCalendar(); }
function hubShowDay(iso) { hubDayDetail = (hubDayDetail === iso) ? null : iso; refreshHubCalendar(); }
function hubOpenEvent(module, page) { enterModule(module); goto(page); }

function renderHubCalendar() {
  if (!DB) return "";
  const m = hubCalMonth, year = m.getFullYear(), month = m.getMonth();
  const monthNames = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
  const dayNames = ["Po","Út","St","Čt","Pá","So","Ne"];
  const firstDay = new Date(year, month, 1);
  let startOfs = firstDay.getDay() - 1; if (startOfs < 0) startOfs = 6;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayIso = today.toISOString().slice(0, 10);

  const byDate = {};
  hubFilterAssignee(hubEventsExpanded(year, month)).forEach(e => {
    (byDate[e.iso] = byDate[e.iso] || []).push(e);
  });

  let cells = "";
  for (let i = 0; i < startOfs; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const ev = byDate[iso] || [];
    const dots = ev.slice(0, 4).map(e => `<span class="cal-dot" style="background:${HUB_EVENT_CATS[e.cat] || "var(--ink-muted)"}"></span>`).join("");
    cells += `<div class="cal-day ${iso === todayIso ? "today" : ""} ${ev.length ? "has-event" : ""}" onclick="hubShowDay('${iso}')">
      <div class="cal-day-num">${d}</div>
      ${ev.length ? `<div class="cal-dots">${dots}${ev.length > 4 ? `<span class="cal-more">+${ev.length - 4}</span>` : ""}</div>` : ""}
    </div>`;
  }

  let detail = "";
  if (hubDayDetail) {
    const dd = parseDateIso(hubDayDetail);
    const dayEvents = hubFilterAssignee(hubEventsExpanded(year, month)).filter(e => e.iso === hubDayDetail);
    const dayLabel = dd ? dd.toLocaleDateString("cs-CZ", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) : hubDayDetail;
    detail = `
      <div class="card elev" style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">${esc(dayLabel)}</div>
          <button class="icon-btn" onclick="hubDayDetail=null; refreshHubCalendar()">✕ Zavřít</button>
        </div>
        ${dayEvents.length ? dayEvents.map(e => `
          <div class="peek-row" onclick="hubOpenEvent('${e.module}','${e.page}')">
            <span class="peek-dot" style="background:${HUB_EVENT_CATS[e.cat] || "var(--ink-muted)"}"></span>
            <span class="peek-title">${esc(e.label)}${e.repeat ? ' <span style="color:var(--ink-muted);font-size:11px">↻</span>' : ""}</span>
            ${e.assignee ? assigneeBadge(e.assignee) : ""}
            <span class="peek-meta">${esc(e.cat)} →</span>
          </div>`).join("") : `<div class="empty" style="padding:16px">Žádné aktivity tento den</div>`}
        <div style="font-size:11px;color:var(--ink-muted);margin-top:8px">Klikni na položku pro otevření v jejím modulu.</div>
      </div>`;
  }

  const legend = Object.keys(HUB_EVENT_CATS).map(c => `<span><span class="cal-dot" style="display:inline-block;background:${HUB_EVENT_CATS[c]}"></span> ${c}</span>`).join("");

  return `
    <div class="cal-wrap card elev">
      <div class="cal-header">
        <button class="cal-nav" onclick="hubCalShift(-1)">‹</button>
        <div class="cal-title">📅 ${monthNames[month]} ${year} — co nás čeká</div>
        <button class="btn" style="font-size:11px;padding:5px 10px" onclick="hubCalToday()">Dnes</button>
        <button class="cal-nav" onclick="hubCalShift(1)">›</button>
      </div>
      <div class="cal-grid">
        ${dayNames.map(d => `<div class="cal-dayname">${d}</div>`).join("")}
        ${cells}
      </div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:12px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--ink-muted);margin-right:2px">Řešitel:</span>
        ${["all", "Já", "Partner", "Oba"].map(a => `<button class="filter-btn ${hubCalAssignee === a ? "active" : ""}" onclick="hubCalAssignee='${a}'; refreshHubCalendar()">${a === "all" ? "Vše" : a}</button>`).join("")}
      </div>
      <div style="display:flex;gap:18px;margin-top:14px;font-size:11px;color:var(--ink-muted);flex-wrap:wrap">
        ${legend}
        <span style="margin-left:auto">Klik na den = náhled</span>
      </div>
    </div>
    ${detail}`;
}

function enterModule(key) {
  if (!MODULES[key] || MODULES[key].soon) return;
  currentModule = key;
  document.getElementById("hubScreen").classList.remove("active");
  document.getElementById("app").classList.remove("locked");
  if (key === "care") renderAll();
}

function goHub() {
  currentModule = null;
  document.getElementById("app").classList.add("locked");
  document.getElementById("hubScreen").classList.add("active");
  renderHub();
}

function goto(page) {
  $$(".nav-item").forEach(n => n.classList.toggle("active", n.dataset.page === page));
  currentPage = page;
  renderAll();
}

function gotoTasksWithPriority(priority) {
  taskFilter = priority;
  taskCategoryFilter = "all";
  goto('tasks');
}

// ============================================================
// MASTER RENDER
// ============================================================

let currentPage = "dashboard";

const PAGES = {
  dashboard: renderDashboard,
  profile: renderProfile,
  examinations: renderExaminations,
  genetics: renderGenetics,
  tasks: renderTasks,
  contacts: renderContacts,
  appointments: renderAppointments,
  exercise: renderExercise,
  growth: renderGrowth,
  skills: renderSkills
};

// Sekční barevnost — každá stránka má svůj akcent (--sec), ať je smyslově jasné, kde jsi
const PAGE_ACCENT = {
  dashboard:    "var(--accent)",
  profile:      "var(--accent)",
  genetics:     "var(--purple)",
  examinations: "var(--blue)",
  tasks:        "var(--red)",
  contacts:     "var(--teal)",
  appointments: "var(--teal)",
  exercise:     "var(--green)",
  growth:       "var(--green)",
  skills:       "var(--yellow)"
};

function renderAll() {
  if (!DB) return; // ještě nejsou načtená data
  const renderer = PAGES[currentPage] || renderDashboard;
  const appEl = document.getElementById("app");
  if (appEl) appEl.style.setProperty("--sec", PAGE_ACCENT[currentPage] || "var(--accent)");
  $("#main").innerHTML = renderer();
  // Update counters
  $("#cnt-tasks").textContent = DB.tasks.filter(t => !t.done).length;
  $("#cnt-contacts").textContent = DB.contacts.length;
  $("#cnt-exam").textContent = DB.examinations.length;
}

// ============================================================
// INIT
// ============================================================

document.addEventListener("DOMContentLoaded", () => {
  // Nav handlery (přepínání stránek)
  $$(".nav-item").forEach(item => {
    item.addEventListener("click", () => {
      if (!DB) return; // ignorovat, dokud nejsou data
      $$(".nav-item").forEach(n => n.classList.remove("active"));
      item.classList.add("active");
      currentPage = item.dataset.page;
      renderAll();
    });
  });

  // Heslo: Enter = odeslat
  const authInput = document.getElementById("authInput");
  if (authInput) {
    authInput.addEventListener("keydown", e => {
      if (e.key === "Enter") tryUnlock();
    });
    authInput.focus();
  }

  // Inicializace Firebase + automatické obnovení přihlášení (pokud trvá session).
  // Pokud SDK ještě není načtené, krátce počkáme a zkoušíme znovu.
  try {
    if (FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "VLOŽ_SVŮJ_API_KEY") {
      if (!initFirebaseApp()) {
        let tries = 0;
        const t = setInterval(() => { if (initFirebaseApp() || ++tries > 50) clearInterval(t); }, 100);
      }
    }
  } catch (e) {}
});

// Když se SDK načte později (po DOMContentLoaded), nic neděláme — initFirebase si na to počká.

</script>
